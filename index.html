<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folie</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --fl-columns: 12;
        --fl-gutter: 10px;
        --fl-margin: 20px;
        --fl-span: 2;
      }

      body {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 10px;
        background: #bababa;
        color: #111;
        min-height: 100dvh;
      }

      .logo {
        display: flex;
        align-items: start;
        max-width: 100%;
        margin-bottom: 20px;
      }

      .logo svg {
        height: 100%;
      }

      .card {
        position: fixed;
        top: var(--fl-margin);
        left: var(--fl-margin);
        width: calc(var(--fl-span) * (100vw - 2 * var(--fl-margin) - (var(--fl-columns) - 1) * var(--fl-gutter)) / var(--fl-columns) + (var(--fl-span) - 1) * var(--fl-gutter));
        background: #fff;
        /* border-radius: 10px; */
        padding: 10px;
        transition: 0.2s ease-out;
      }

      .title {
        color: #aaa;
        margin-bottom: 20px;
        text-transform: uppercase;
      }

      .title strong {
        color: #111;
      }

      .presets {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 24px;
      }

      button {
        all: unset;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 12px;
        /* border-radius: 5px; */
        background: #ebebeb;
        color: #aaa;
        transition:
          background 0.1s,
          color 0.1s;
        gap: 24px;
      }

      .card button:hover {
        background: #e0e0e0;
        color: #555;
      }
      .card button.active {
        background: #111;
        color: #fff;
      }

      .btn-name {
        text-transform: uppercase;
      }
      .btn-meta {
        opacity: 0.5;
        text-align: right;
        white-space: nowrap;
      }
      .card button.active .btn-meta {
        opacity: 0.4;
      }

      .modes {
        display: flex;
        flex-direction: row;
        gap: 4px;
        margin-bottom: 24px;
      }

      .modes button {
        flex: 1;
        justify-content: center;
      }

      footer {
        display: flex;
        gap: 12px;
        color: #000;
        text-transform: uppercase;
      }

      footer a {
        color: #000;
        text-decoration: none;
      }
      footer a:hover {
        color: #111;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg width="637" height="247" viewBox="0 0 637 247" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 242.917V0H159.563V27.2176H32.3209V104.448H143.913V131.665H32.3209V242.917H0Z" fill="black" />
          <path d="M153.854 155.141C153.854 103.427 183.453 62.9408 239.249 62.9408C295.045 62.9408 324.645 103.427 324.645 155.141C324.645 206.514 295.045 247 239.249 247C183.453 247 153.854 206.514 153.854 155.141ZM184.474 155.141C184.474 197.668 208.97 221.483 239.249 221.483C269.529 221.483 294.025 197.668 294.025 155.141C294.025 112.273 269.529 88.4573 239.249 88.4573C208.97 88.4573 184.474 112.273 184.474 155.141Z" fill="black" />
          <path d="M333.225 242.917V0H362.143V242.917H333.225Z" fill="black" />
          <path d="M381.427 242.917V67.0234H410.346V242.917H381.427ZM410.346 0V35.3829H381.427V0H410.346Z" fill="black" />
          <path d="M549.387 187.121H577.965C570.14 225.906 542.242 247 502.777 247C446.64 247 420.103 208.215 418.402 154.46C418.402 101.726 453.104 62.9408 501.075 62.9408C563.336 62.9408 582.388 121.118 580.687 163.646H449.022C448.001 194.266 465.352 221.483 503.797 221.483C527.613 221.483 544.283 209.916 549.387 187.121ZM449.022 138.129H550.067C548.706 110.572 527.953 88.4573 499.374 88.4573C469.095 88.4573 451.063 111.252 449.022 138.129Z" fill="black" />
          <path d="M601 0H637V36H601V0Z" fill="black" />
        </svg>
      </div>
      <p class="title">— ctrl+g to toggle</p>

      <div class="presets">
        <button class="active" data-cols="6" data-gutter="10px" data-span="1">
          <span class="btn-name">6 col</span>
          <span class="btn-meta">20px / 20px</span>
        </button>
        <button data-cols="12" data-gutter="10px" data-span="2">
          <span class="btn-name">12 col</span>
          <span class="btn-meta">20px / 20px</span>
        </button>
        <button data-cols="24" data-gutter="10px" data-span="4">
          <span class="btn-name">24 col</span>
          <span class="btn-meta">20px / 10px</span>
        </button>
      </div>

      <div class="modes">
        <button class="active" data-mode="fill">
          <span class="btn-name">Fill</span>
        </button>
        <button data-mode="outline">
          <span class="btn-name">Outline</span>
        </button>
      </div>

      <div class="modes">
        <button id="rows-toggle">
          <span class="btn-name">Rows</span>
        </button>
      </div>

      <footer>
        <span>©2026</span>
        <span>•</span>
        <a href="https://github.com/francescophra/folie" target="_blank">github</a>
      </footer>
    </div>

    <script type="module">
      import Folie from "./index.js";

      const root = document.documentElement.style;
      let instance;
      let currentCols = 6;
      let currentMode = "fill";
      let currentRows = false;

      // Keep span/cols = 1/6 at all breakpoints so card width stays constant.
      // desktop: cols/6 — tablet: cols/3 — mobile: cols*2/3
      function spanForCols(cols) {
        if (window.innerWidth <= 767) return Math.round((cols * 2) / 3);
        if (window.innerWidth <= 1023) return Math.round(cols / 3);
        return Math.round(cols / 6);
      }

      function updateSpan() {
        root.setProperty("--fl-span", spanForCols(currentCols));
      }

      function build(cols, gutter) {
        currentCols = +cols;
        instance?.destroy();
        instance = new Folie({
          columns: currentCols, gutter, margin: "20px",
          toggleButton: true, mode: currentMode, color: "#0051FF",
          ...(currentRows && {rows: 6, rowsGutter: gutter, rowsMargin: "20px", rowsColor: "#0051FF", rowsOpacity: 0.05}),
        }).mount();
        root.setProperty("--fl-columns", cols);
        root.setProperty("--fl-gutter", gutter);
        updateSpan();
      }

      build("6", "10px");

      window.addEventListener("resize", updateSpan);

      document.querySelectorAll(".presets button").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".presets button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          build(btn.dataset.cols, btn.dataset.gutter);
        });
      });

      document.querySelectorAll("[data-mode]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("[data-mode]").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentMode = btn.dataset.mode;
          const activePreset = document.querySelector(".presets button.active");
          build(activePreset.dataset.cols, activePreset.dataset.gutter);
        });
      });

      document.getElementById("rows-toggle").addEventListener("click", () => {
        currentRows = !currentRows;
        document.getElementById("rows-toggle").classList.toggle("active", currentRows);
        const activePreset = document.querySelector(".presets button.active");
        build(activePreset.dataset.cols, activePreset.dataset.gutter);
      });
    </script>
  </body>
</html>
